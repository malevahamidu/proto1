<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUSSINESS APP TEST</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;display:flex;background:#0f172a;color:white}
.sidebar{width:260px;background:#1e293b;height:100vh;padding:20px;display:none;overflow:auto}
.sidebar button{width:100%;padding:10px;margin:5px 0;background:#334155;border:none;color:white;cursor:pointer}
.main{flex:1;padding:20px;overflow:auto}
.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px;display:inline-block}
.login{margin:auto;width:320px;padding:20px;background:#1e293b;border-radius:10px}
input,select,textarea{width:100%;padding:8px;margin:5px 0}
.ai-box{position:fixed;bottom:20px;right:20px;background:#1e293b;padding:15px;border-radius:10px;width:300px}
</style>
</head>
<body>

<div class="login" id="loginBox">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<div class="sidebar" id="sidebar">
<h2>Inventory</h2>
<button onclick="loadPage('dashboard')">Dashboard</button>
<button onclick="loadPage('register')">Product Register</button>
<button onclick="loadPage('stock')">Agent Stock</button>
<button onclick="loadPage('transfer')">Stock Transfer</button>
<button onclick="loadPage('deduction')">Stock Deduction</button>
<button onclick="loadPage('purchases')">Purchases</button>
<button onclick="loadPage('sales')">New Sales</button>
<button onclick="loadPage('invoice')">Invoice</button>
<button onclick="loadPage('reports')">Reports</button>
</div>

<div class="main" id="content" style="display:none"></div>

<div class="ai-box" id="aiBox" style="display:none">
<h3>AI Assistant</h3>
<textarea id="aiInput"></textarea>
<button onclick="aiReply()">Ask</button>
<p id="aiOutput"></p>
</div>

<script>
// DATABASE (LOCAL STORAGE SIMULATION)
let users=JSON.parse(localStorage.getItem('users'))||[];
let products=JSON.parse(localStorage.getItem('products'))||[];
let stock=JSON.parse(localStorage.getItem('stock'))||[];
let transfers=JSON.parse(localStorage.getItem('transfers'))||[];
let sales=JSON.parse(localStorage.getItem('sales'))||[];
let purchases=JSON.parse(localStorage.getItem('purchases'))||[];

function save(k,d){localStorage.setItem(k,JSON.stringify(d));}

// AUTH
function register(){
if(!email.value||!phone.value||!password.value){msg('Fill all');return}
users.push({email:email.value,phone:phone.value,password:password.value});
save('users',users);msg('Registered');}

function login(){
let u=users.find(x=>x.email===email.value&&x.phone===phone.value&&x.password===password.value);
if(u){showApp()}else msg('Invalid');}

function showApp(){
loginBox.style.display='none';sidebar.style.display='block';content.style.display='block';aiBox.style.display='block';loadPage('dashboard');}

function msg(t){loginMsg.innerText=t}

// PAGES
function loadPage(p){

if(p==='dashboard'){
content.innerHTML=`<h1>Dashboard</h1>
<div class='card'>Active Agents: ${stock.length}</div>
<div class='card'>Today's Sales: ${sales.length}</div>
<div class='card'>Purchases: ${purchases.length}</div>
<div class='card'>Pending Transfers: ${transfers.filter(t=>t.status==='pending').length}</div>
<button onclick='exportExcel()'>Export Excel</button>`;
}

if(p==='register'){
content.innerHTML=`<h1>Product Register</h1>
<input id='name' placeholder='Product Name'>
<input id='model' placeholder='Model'>
<input id='brand' placeholder='Brand'>
<input id='buy' placeholder='Buying Price'>
<input id='sell' placeholder='Selling Price'>
<input id='tax' placeholder='Tax %'>
<select id='status'><option>active</option><option>inactive</option></select>
<button onclick='addProduct()'>Save</button>`;
}

if(p==='stock'){
content.innerHTML=`<h1>Agent Stock</h1>
<input id='agent' placeholder='Agent Name'>
<input id='serial' placeholder='Serial'>
<input id='value' placeholder='Value'>
<select id='sstatus'><option>active</option><option>inactive</option></select>
<button onclick='addStock()'>Add</button>
${stock.map(s=>`<div>${s.agent} | ${s.serial} | ${s.value} | ${s.status}</div>`).join('')}`;
}

if(p==='transfer'){
content.innerHTML=`<h1>Stock Transfer</h1>
<input id='from' placeholder='From Agent'>
<input id='to' placeholder='To Agent'>
<input id='serial' placeholder='Serial'>
<input id='qty' placeholder='Quantity'>
<input id='price' placeholder='Price per Product'>
<button onclick='transferStock()'>Transfer</button>
${transfers.map(t=>`<div>${t.serial} | ${t.status}</div>`).join('')}`;
}

if(p==='deduction'){
content.innerHTML=`<h1>Stock Deduction</h1>
<input id='serial' placeholder='Serial'>
<input id='reason' placeholder='Reason'>
<button onclick='deductStock()'>Remove</button>`;
}

if(p==='purchases'){
content.innerHTML=`<h1>Purchases</h1>
<input id='supplier' placeholder='Supplier'>
<input id='serial' placeholder='Serial'>
<input id='amount' placeholder='Amount'>
<button onclick='addPurchase()'>Save</button>`;
}

if(p==='sales'){
content.innerHTML=`<h1>New Sale</h1>
<input id='name' placeholder='Product'>
<input id='serial' placeholder='Serial'>
<input id='price' placeholder='Price'>
<input id='customer' placeholder='Customer Name'>
<input id='cid' placeholder='Customer ID'>
<input id='company' placeholder='Company'>
<button onclick='sellProduct()'>Sell</button>`;
}

if(p==='invoice'){
content.innerHTML=`<h1>Invoice</h1>
<input id='name' placeholder='Product'>
<input id='qty' placeholder='Qty'>
<input id='price' placeholder='Price'>
<button onclick='invoice()'>Generate</button>
<div id='out'></div>`;
}

if(p==='reports'){
content.innerHTML=`<h1>Reports</h1>
<canvas id='chart'></canvas>`;
setTimeout(drawChart,200);
}
}

// FUNCTIONS
function addProduct(){products.push({name:name.value,model:model.value,brand:brand.value});save('products',products);alert('Saved');}
function addStock(){stock.push({agent:agent.value,serial:serial.value,value:value.value,status:sstatus.value});save('stock',stock);loadPage('stock');}
function transferStock(){transfers.push({serial:serial.value,status:'pending'});save('transfers',transfers);loadPage('transfer');}
function deductStock(){stock=stock.filter(s=>s.serial!==serial.value);save('stock',stock);alert('Removed');}
function addPurchase(){purchases.push({supplier:supplier.value});save('purchases',purchases);}
function sellProduct(){sales.push({serial:serial.value});stock=stock.filter(s=>s.serial!==serial.value);save('sales',sales);save('stock',stock);alert('Sold');}
function invoice(){let total=qty.value*price.value;out.innerHTML='Total: '+total}

function drawChart(){
new Chart(document.getElementById('chart'),{
type:'bar',
data:{labels:['Sales','Purchases'],datasets:[{data:[sales.length,purchases.length]}]}
});}

function exportExcel(){alert('Excel Export Ready (connect backend)');}

// AI CONTROL
function aiReply(){
let q=aiInput.value.toLowerCase();
if(q.includes('dashboard')) loadPage('dashboard');
else if(q.includes('stock')) loadPage('stock');
else if(q.includes('sales')) loadPage('sales');
aiOutput.innerText='Command executed';}

</script>
</body>
</html>
