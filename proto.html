If you want something more “AI-tech looking”, add this before </body>:

<canvas id="bgCanvas"></canvas>

<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.style.position = "fixed";
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.zIndex = -1;

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
r: Math.random()*2,
dx: Math.random()-0.5,
dy: Math.random()-0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x += p.dx;
p.y += p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.7)";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();
</script>

<body>

<div class="login" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<div class="sidebar" id="sidebar">
<h2>System</h2>
<button onclick="loadPage('dashboard')">Dashboard</button>
<button onclick="loadPage('admin')">Admin</button>
<button onclick="loadPage('register')">Sales Register</button>
<button onclick="loadPage('stock')">Agent Stock</button>
<button onclick="loadPage('transfer')">Stock Transfer</button>
<button onclick="loadPage('deduction')">Stock Deduction</button>
<button onclick="loadPage('purchases')">Purchases</button>
<button onclick="loadPage('sales')">New Sales</button>
<button onclick="loadPage('invoice')">Invoice & Receipt</button>
<button onclick="loadPage('reports')">Reports</button>
<button onclick="loadPage('tax')">Tax System</button>
<button onclick="exportCSV()">Export CSV</button>
</div>

<div class="main" id="content" style="display:none"></div>

<div class="ai-box" id="aiBox" style="display:none">
<h3>AI Assistant</h3>
<textarea id="aiInput"></textarea>
<button onclick="aiReply()">Ask</button>
<p id="aiOutput"></p>
</div>

<script>
// DATABASE (LocalStorage simulation)
let users=JSON.parse(localStorage.getItem('users'))||[];
let products=JSON.parse(localStorage.getItem('products'))||[];
let stock=JSON.parse(localStorage.getItem('stock'))||[];
let transfers=JSON.parse(localStorage.getItem('transfers'))||[];
let sales=JSON.parse(localStorage.getItem('sales'))||[];
let purchases=JSON.parse(localStorage.getItem('purchases'))||[];

function save(k,d){localStorage.setItem(k,JSON.stringify(d));}

// AUTH
function register(){
if(!email.value||!phone.value||!password.value){msg('Fill all');return}
users.push({email:email.value,phone:phone.value,password:password.value});
save('users',users);msg('Registered');}

function login(){
let u=users.find(x=>x.email===email.value&&x.phone===phone.value&&x.password===password.value);
if(u){showApp()}else msg('Invalid');}

function showApp(){
loginBox.style.display='none';sidebar.style.display='block';content.style.display='block';aiBox.style.display='block';loadPage('dashboard');}

function msg(t){loginMsg.innerText=t}

// PAGES
function loadPage(p){

if(p==='dashboard'){
content.innerHTML=`<h1>Dashboard</h1>
<div class='card'>Active Agents: ${new Set(stock.map(s=>s.agent)).size}</div>
<div class='card'>Today's Sales: ${sales.length}</div>
<div class='card'>Today's Purchases: ${purchases.length}</div>
<div class='card'>Pending Transfers: ${transfers.filter(t=>t.status==='pending').length}</div>`;
}

if(p==='admin'){
content.innerHTML=`<h1>Admin Panel</h1>
<p>Manage Agents, Team Leaders, Branches</p>`;
}

if(p==='register'){
content.innerHTML=`<h1>Sales Register</h1>
<input id='type' placeholder='Product Type'>
<input id='model' placeholder='Model'>
<input id='brand' placeholder='Brand'>
<input id='buy' placeholder='Buying Price'>
<input id='sell' placeholder='Selling Price'>
<input id='tax' placeholder='Tax %'>
<select id='status'><option>active</option><option>inactive</option></select>
<button onclick='addProduct()'>Save</button>`;
}

if(p==='stock'){
content.innerHTML=`<h1>Agent Stock</h1>
<input id='agent' placeholder='Agent Name'>
<input id='serial' placeholder='Product Serial'>
<input id='value' placeholder='Product Value'>
<select id='sstatus'><option>active</option><option>inactive</option></select>
<button onclick='addStock()'>Add</button>
${stock.map(s=>`<div>${s.agent} | ${s.serial} | ${s.value} | ${s.status}</div>`).join('')}`;
}

if(p==='transfer'){
content.innerHTML=`<h1>Stock Transfer</h1>
<input id='from' placeholder='From Agent'>
<input id='to' placeholder='To Agent'>
<input id='serial' placeholder='Serial'>
<input id='qty' placeholder='Quantity'>
<input id='price' placeholder='Price per Product'>
<button onclick='transferStock()'>Transfer</button>
${transfers.map(t=>`<div>${t.serial} | ${t.status}</div>`).join('')}`;
}

if(p==='deduction'){
content.innerHTML=`<h1>Stock Deduction</h1>
<input id='serial' placeholder='Serial'>
<input id='reason' placeholder='Reason'>
<button onclick='deductStock()'>Remove</button>`;
}

if(p==='purchases'){
content.innerHTML=`<h1>Purchases</h1>
<input id='supplier' placeholder='Supplier Name'>
<input id='serial' placeholder='Product Serial'>
<input id='amount' placeholder='Amount'>
<input type='file' accept='image/*' capture='environment'>
<button onclick='addPurchase()'>Save</button>`;
}

if(p==='sales'){
content.innerHTML=`<h1>New Sales</h1>
<input id='name' placeholder='Product Name'>
<input id='serial' placeholder='Serial'>
<input id='price' placeholder='Price'>
<input id='customer' placeholder='Customer Name'>
<input id='phoneC' placeholder='Customer Phone'>
<input id='company' placeholder='Company'>
<button onclick='sellProduct()'>Sell</button>`;
}

if(p==='invoice'){
content.innerHTML=`<h1>Invoice & Receipt</h1>
<input id='name' placeholder='Product'>
<input id='serial' placeholder='Serial'>
<input id='customer' placeholder='Customer'>
<input id='phone' placeholder='Phone'>
<input id='price' placeholder='Price'>
<button onclick='generateReceipt()'>Generate</button>
<div id='receipt'></div>`;
}

if(p==='reports'){
content.innerHTML=`<h1>Reports</h1><canvas id='chart'></canvas>`;
setTimeout(drawChart,200);
}

if(p==='tax'){
content.innerHTML=`<h1>Tax System</h1>
<p>EFD Integration Ready</p>
<p>Online Tax Filing Enabled</p>`;
}
}

// CORE FUNCTIONS
function addProduct(){products.push({type:type.value,model:model.value,brand:brand.value});save('products',products);alert('Saved');}

function addStock(){stock.push({agent:agent.value,serial:serial.value,value:value.value,status:sstatus.value});save('stock',stock);loadPage('stock');}

function transferStock(){transfers.push({serial:serial.value,from:from.value,to:to.value,status:'pending'});save('transfers',transfers);loadPage('transfer');}

function deductStock(){stock=stock.filter(s=>s.serial!==serial.value);save('stock',stock);alert('Removed');}

function addPurchase(){purchases.push({supplier:supplier.value,serial:serial.value});save('purchases',purchases);}

function sellProduct(){sales.push({serial:serial.value});stock=stock.filter(s=>s.serial!==serial.value);save('sales',sales);save('stock',stock);alert('Sold');}

function generateReceipt(){
receipt.innerHTML=`<div style='background:white;color:black;padding:10px'>
<h3>Receipt</h3>
<p>${name.value}</p>
<p>Serial: ${serial.value}</p>
<p>Customer: ${customer.value}</p>
<p>Phone: ${phone.value}</p>
<p>Total: ${price.value}</p>
<button onclick='window.print()'>Print</button>
</div>`;
}

function drawChart(){
new Chart(document.getElementById('chart'),{
type:'bar',
data:{labels:['Sales','Purchases'],datasets:[{data:[sales.length,purchases.length]}]}
});}

// EXPORT CSV
function exportCSV(){
let csv='Serial,Agent,Value\n'+stock.map(s=>`${s.serial},${s.agent},${s.value}`).join('\n');
let blob=new Blob([csv]);
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='stock.csv';
a.click();
}

// AI CONTROL
function aiReply(){
let q=aiInput.value.toLowerCase();
if(q.includes('dashboard')) loadPage('dashboard');
if(q.includes('stock')) loadPage('stock');
if(q.includes('sales')) loadPage('sales');
if(q.includes('report')) loadPage('reports');
aiOutput.innerText='AI executed: '+q;
}

</script>
